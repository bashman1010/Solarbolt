<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Solar bolt-nut calculator | PV Bolt & Nut Calculator</title>
  <meta name="theme-color" content="#173e2a">
  <meta name="description" content="Industrial solar panel fastener calculator – bolt and nut sets for PV arrays">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0e2a1c;
      background-image: radial-gradient(circle at 15% 30%, rgba(90, 120, 70, 0.2) 1.5px, transparent 1.5px),
                        radial-gradient(circle at 80% 65%, rgba(60, 85, 45, 0.15) 1px, transparent 1px);
      background-size: 48px 48px, 32px 32px;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.8rem;
    }

    .solar-calc {
      max-width: 800px;
      width: 100%;
      padding: 2em;
      background: #ffffff;
      border-radius: 2.25rem;
      box-shadow: 0 28px 44px -16px rgba(0, 0, 0, 0.4), 0 2px 6px rgba(0, 0, 0, 0.05);
      overflow: hidden;
    }

    .calc-header {
      background: #173e2a;
      padding: 1.8rem 2rem 1.4rem 2rem;
      color: white;
      border-bottom: 5px solid #f2b138;
      border-radius: 2.25rem;
    }

    .calc-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .calc-header h1 .badge {
      background: #f2b138;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      color: #173e2a;
    }

    .sub {
      font-size: 0.88rem;
      margin-top: 12px;
      opacity: 0.88;
      border-left: 3px solid #f2b138;
      padding-left: 14px;
    }

    .calc-body {
      padding: 2rem 2rem 1.8rem 2rem;
    }

    .input-group {
      margin-bottom: 2rem;
    }

    .input-group label {
      font-weight: 700;
      font-size: 0.7rem;
      color: #1c3e2b;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 0.75rem;
      margin-top: 2em;
    }

    .field-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .panel-input {
      flex: 2;
      padding: 1rem 1.2rem;
      font-size: 1.2rem;
      font-weight: 500;
      border: 2px solid #e0ede5;
      border-radius: 2rem;
      background: #fefef9;
      transition: all 0.2s;
      font-family: monospace;
      color: #1f3d2c;
      min-width: 160px;
    }

    .panel-input:focus {
      outline: none;
      border-color: #f2b138;
      box-shadow: 0 0 0 3px rgba(242, 177, 56, 0.25);
      background: #ffffff;
    }

    .btn-calc {
      background: #f2b138;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      color: #1c3e2b;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
    }

    .btn-calc:hover {
      background: #e6a128;
      transform: translateY(-2px);
    }

    .demo-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .chip {
      background: #eef4ea;
      border-radius: 40px;
      padding: 0.4rem 1.1rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #2a5e3f;
      cursor: pointer;
      border: 1px solid #cbdfd1;
    }

    .chip:hover {
      background: #f2b138;
      color: #1d3c2a;
    }

    .result-card {
      background: #f7faf6;
      border-radius: 1.8rem;
      padding: 1.6rem;
      margin: 1rem 0 0.5rem;
      border: 1px solid #deecdf;
    }

    .result-label {
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 1.2px;
      font-weight: 700;
      color: #648a71;
    }

    .result-number {
      font-size: 3.6rem;
      font-weight: 800;
      color: #1d522f;
      line-height: 1.2;
      margin: 8px 0 6px;
    }

    .result-unit {
      font-size: 1.1rem;
      font-weight: 600;
      color: #4e705b;
    }

    .extra-note {
      font-size: 0.78rem;
      border-top: 1px dashed #c8ddcf;
      margin-top: 1rem;
      padding-top: 1rem;
      color: #5e7f6a;
    }

    .error-msg {
      background: #ffeae4;
      color: #bf542f;
      padding: 0.8rem 1.2rem;
      border-radius: 1.2rem;
      margin-bottom: 1rem;
      border-left: 6px solid #bf542f;
    }

    .info-banner {
      background: #eef2ea;
      border-radius: 1.2rem;
      padding: 0.8rem 1.2rem;
      margin-bottom: 1.8rem;
      font-size: 0.85rem;
      color: #2f5e42;
      border: 1px solid #cde2d3;
    }

    footer {
      background: #fcfef9;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 0.7rem;
      color: #7b9a87;
      border-top: 1px solid #e3efe6;
    }

    #installBtn {
      display: none;
      width: 100%;
      background: #1c5c3a;
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 3rem;
      font-weight: bold;
      margin-top: 1rem;
      cursor: pointer;
    }

    @media (max-width: 550px) {
      .calc-body { padding: 1.5rem; }
      .result-number { font-size: 2.7rem; }
      .btn-calc { padding: 0.7rem 1.5rem; }
      .calc-header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="solar-calc">
  <div class="calc-header">
    <h1>Lamisaid services <span class="badge"></span></h1>
    <div class="sub">Precision PV mounting hardware · bolt + nut sets per panel array</div>
  </div>

 

    <div class="input-group">
      <label>🔩 Number of solar panels (x) <span style="font-weight: normal;">(integer ≥ 0)</span></label>
      <div class="field-row">
        <input type="number" id="panelCount" class="panel-input" placeholder="e.g., 4, 5, 9, 10" step="1" min="0">
       <button id="calculateBtn" class="btn-calc">⚡ Calculate</button>
      </div>


    <div id="resultContainer">
      <div class="result-card">
        <div class="result-label">📋 READY FOR INPUT</div>
        <div class="result-number" style="font-size: 1.7rem; font-weight: 500;">Enter panel count</div>
    
      </div>
    </div>
    <button id="installBtn">📲 Install App</button>
  </div>
  
</div>

<script>
  // -------------------- CALCULATOR LOGIC (separate, no conflicts) --------------------
  (function() {
    const panelInput = document.getElementById('panelCount');
    const calculateBtn = document.getElementById('calculateBtn');
    const resultContainer = document.getElementById('resultContainer');

    function calculateHardware(panels) {
      if (typeof panels !== 'number' || isNaN(panels)) return 0;
      const raw = 2 * panels - 2;
      return raw > 0 ? raw : 0;
    }

    function parsePanels(inputValue) {
      if (inputValue === null || inputValue === undefined || inputValue.trim() === '') {
        return { valid: false, error: 'Please enter the number of solar panels.' };
      }
      const num = Number(inputValue);
      if (isNaN(num)) return { valid: false, error: 'Invalid input: use numeric values only.' };
      if (!Number.isInteger(num)) {
        const floored = Math.floor(num);
        if (floored < 0) return { valid: false, error: 'Panel count cannot be negative.' };
        return { valid: true, panels: floored, warning: `Decimal rounded down to ${floored} panel(s).` };
      }
      if (num < 0) return { valid: false, error: 'Panel count cannot be negative.' };
      return { valid: true, panels: num, warning: null };
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function updateUI() {
      const rawValue = panelInput.value;
      const parseResult = parsePanels(rawValue);

      if (!parseResult.valid) {
        resultContainer.innerHTML = `
          <div class="error-msg">⚠️ ${escapeHtml(parseResult.error)}</div>
          <div class="result-card" style="background: #faf7f0;">
            <div class="result-label">🔄 AWAITING VALID INPUT</div>
            <div class="result-number" style="font-size: 1.3rem; font-weight: 500; color:#7a5a48;">No valid panel count</div>

          </div>
        `;
        return;
      }

      const panels = parseResult.panels;
      const warningMsg = parseResult.warning;
      const requiredSets = calculateHardware(panels);

      let detailMessage = '';
      if (panels === 0) detailMessage = '⚙️ No panels → 0 hardware required.';
      else if (panels === 1) detailMessage = '🔩 Single panel needs 0 additional sets (direct mount).';
      else detailMessage = `✅  Required ${requiredSets} `;

      const warningHtml = warningMsg ? `<div class="error-msg" style="margin-top: 8px; background:#fff0e0; border-left-color:#f2b138;">⚠️ ${escapeHtml(warningMsg)}</div>` : '';

      resultContainer.innerHTML = `
        ${warningHtml}
        <div class="result-card">
          <div class="result-label">🧮 TOTAL HARDWARE REQUIRED</div>
          <div class="result-number">${requiredSets}<span class="result-unit">pieces</span></div>
          <div style="font-weight: 500; color: #2c7645; margin: 6px 0 4px;">🔩 Bolt + Nut sets (each piece = 1 bolt + 1 nut)</div>
          <div style="font-size: 0.85rem; margin-top: 8px;">${detailMessage}</div>
          
        </div>
      `;
    }

    // Event listeners
    calculateBtn.addEventListener('click', updateUI);
    panelInput.addEventListener('input', updateUI);
    panelInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') updateUI(); });

    // Demo chips
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const demoVal = chip.getAttribute('data-demo');
        if (demoVal) {
          panelInput.value = demoVal;
          updateUI();
          panelInput.focus();
        }
      });
    });

    // Initial display
    if (!panelInput.value) {
      resultContainer.innerHTML = `
        <div class="result-card">
          <div class="result-label">🌞 SOLAR HARDWARE ESTIMATOR</div>
          
      `;
    } else {
      updateUI();
    }
  })();

  // -------------------- PWA INSTALL (separate, no interference) --------------------
  (function() {
    const installBtn = document.getElementById('installBtn');
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (installBtn) installBtn.style.display = 'block';
    });

    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') console.log('PWA installed');
          deferredPrompt = null;
          installBtn.style.display = 'none';
        }
      });
    }

    window.addEventListener('appinstalled', () => {
      if (installBtn) installBtn.style.display = 'none';
      console.log('PWA installed');
    });

    // Service worker registration (only if sw.js exists)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .then(reg => console.log('SW registered:', reg))
        .catch(err => console.log('SW failed:', err));
    }
  })();
</script>
</body>
</html>
